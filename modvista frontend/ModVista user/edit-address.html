<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Address | ModVista</title>
    <meta name="description" content="Edit your delivery address on ModVista.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="edit-address.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Mod<span>Vista</span></a>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="shop.html" class="nav-link">Shop</a></li>

                <li><a href="wishlist.html" class="nav-link">Wishlist</a></li>
                <li><a href="cart.html" class="nav-link">Cart</a></li>
                <li><a href="profile.html" class="nav-link">Profile</a></li>
            </ul>

            <div class="nav-actions">
                <a href="cart.html" class="cart-icon-wrapper">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count-badge" id="cart-count" style="display: none;">0</span>
                </a>
            </div>

            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="edit-address-section">
        <div class="address-page">
            <div class="address-card">
                <div class="form-header">
                    <h1 class="section-title left"><span class="highlight" id="page-title-action">EDIT</span> ADDRESS
                    </h1>
                    <p class="section-subtitle">Please ensure your delivery details are accurate for lightning-fast
                        shipping.</p>
                </div>

                <form id="edit-address-form" class="address-form-standalone">
                    <div class="form-grid">
                        <!-- Personal Info -->
                        <div class="form-section">
                            <div class="section-title-group">
                                <div class="section-title-box">
                                    <i class="fas fa-user"></i> Personal Information
                                </div>
                            </div>
                            <div class="fields-container form-grid-2 desktop-grid-2">
                                <div class="field">
                                    <label for="full-name">Full Name</label>
                                    <input type="text" id="full-name" placeholder="E.g. Alex Rodriguez" required>
                                </div>
                                <div class="field">
                                    <label for="mobile-number">Mobile Number</label>
                                    <input type="tel" id="mobile-number" placeholder="10-digit mobile number" required
                                        pattern="[0-9]{10}">
                                </div>
                            </div>
                        </div>

                        <!-- Address Info -->
                        <div class="form-section">
                            <div class="section-title-group">
                                <div class="section-title-box">
                                    <i class="fas fa-map-marker-alt"></i> Delivery Address
                                </div>
                            </div>
                            <div class="fields-container">
                                <!-- Top Row: 2 columns on desktop -->
                                <div class="form-grid-2 desktop-grid-2">
                                    <div class="field">
                                        <label for="house-info">House / Flat / Building Name</label>
                                        <input type="text" id="house-info" placeholder="E.g. Flat 402, Skyline Towers"
                                            required>
                                    </div>
                                    <div class="field">
                                        <label for="street-info">Street / Area / Landmark (Optional)</label>
                                        <input type="text" id="street-info"
                                            placeholder="E.g. Performance Way, Silicon Valley" required>
                                    </div>
                                </div>

                                <!-- Bottom Row: 3 columns on desktop -->
                                <div class="form-grid-3 desktop-grid-3">
                                    <div class="field">
                                        <label for="city">City</label>
                                        <input type="text" id="city" placeholder="E.g. San Francisco" required>
                                    </div>
                                    <div class="field">
                                        <label for="pincode">Pincode</label>
                                        <input type="text" id="pincode" placeholder="6-digit ZIP code" required
                                            pattern="[0-9]{6}">
                                    </div>
                                    <div class="field">
                                        <label for="state">State</label>
                                        <select id="state" required>
                                            <option value="" disabled selected>Select State</option>
                                            <option value="Andhra Pradesh">Andhra Pradesh</option>
                                            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                                            <option value="Assam">Assam</option>
                                            <option value="Bihar">Bihar</option>
                                            <option value="Chhattisgarh">Chhattisgarh</option>
                                            <option value="Goa">Goa</option>
                                            <option value="Gujarat">Gujarat</option>
                                            <option value="Haryana">Haryana</option>
                                            <option value="Himachal Pradesh">Himachal Pradesh</option>
                                            <option value="Jharkhand">Jharkhand</option>
                                            <option value="Karnataka">Karnataka</option>
                                            <option value="Kerala">Kerala</option>
                                            <option value="Madhya Pradesh">Madhya Pradesh</option>
                                            <option value="Maharashtra">Maharashtra</option>
                                            <option value="Manipur">Manipur</option>
                                            <option value="Meghalaya">Meghalaya</option>
                                            <option value="Mizoram">Mizoram</option>
                                            <option value="Nagaland">Nagaland</option>
                                            <option value="Odisha">Odisha</option>
                                            <option value="Punjab">Punjab</option>
                                            <option value="Rajasthan">Rajasthan</option>
                                            <option value="Sikkim">Sikkim</option>
                                            <option value="Tamil Nadu">Tamil Nadu</option>
                                            <option value="Telangana">Telangana</option>
                                            <option value="Tripura">Tripura</option>
                                            <option value="Uttar Pradesh">Uttar Pradesh</option>
                                            <option value="Uttarakhand">Uttarakhand</option>
                                            <option value="West Bengal">West Bengal</option>
                                            <option value="Delhi">Delhi</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Preferences -->
                        <div class="form-section">
                            <div class="section-title-group">
                                <div class="section-title-box">
                                    <i class="fas fa-tag"></i> Preferences
                                </div>
                            </div>
                            <div class="fields-container">
                                <div class="field">
                                    <label>Address Type</label>
                                    <div class="address-type-selector">
                                        <label class="type-option">
                                            <input type="radio" name="address-type" value="Home" checked>
                                            <div class="type-box">
                                                <i class="fas fa-home"></i>
                                                <span>Home</span>
                                            </div>
                                        </label>
                                        <label class="type-option">
                                            <input type="radio" name="address-type" value="Work">
                                            <div class="type-box">
                                                <i class="fas fa-briefcase"></i>
                                                <span>Work</span>
                                            </div>
                                        </label>
                                        <label class="type-option">
                                            <input type="radio" name="address-type" value="Other">
                                            <div class="type-box">
                                                <i class="fas fa-map-pin"></i>
                                                <span>Other</span>
                                            </div>
                                        </label>
                                    </div>
                                </div>
                                <div class="checkbox-group" onclick="document.getElementById('set-default').click()">
                                    <input type="checkbox" id="set-default">
                                    <label for="set-default">Set as my default shipping address</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-footer-actions">
                        <button type="button" class="secondary-btn"
                            onclick="window.location.href='addresses.html'">Cancel</button>
                        <button type="submit" class="primary-btn submit-btn">Save Address Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="section-container">
            <div class="footer-bottom">
                <p>© 2026 ModVista. All rights reserved.</p>
                <div class="footer-links-small">
                    <a href="#">Privacy Policy</a>
                    <a href="#">Terms of Service</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="cart-script.js"></script>
    <script src="edit-address.js"></script>
</body>

</html>
