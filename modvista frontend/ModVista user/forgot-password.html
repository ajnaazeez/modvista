<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModVista | Forgot Password</title>
    <meta name="description" content="Reset your ModVista account password via SMS OTP.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <main class="signup-container">
        <!-- Left Section: Branding -->
        <section class="hero-section login">
            <div class="overlay"></div>
            <div class="branding-content">
                <h1 class="logo">Mod<span class="highlight">Vista</span></h1>
                <p class="tagline">RECOVER YOUR ACCOUNT</p>
            </div>
        </section>

        <!-- Right Section: Forgot Password Form -->
        <section class="form-section">
            <div class="form-panel">
                <header class="form-header">
                    <h2>Forgot Password?</h2>
                    <p>Enter your registered email and we'll send an OTP to your email address.</p>
                </header>

                <div id="alert-box" class="alert-box" style="display:none;"></div>

                <form id="forgot-form" novalidate>
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
                        <span class="error-message" id="email-error"></span>
                    </div>

                    <button type="submit" id="submit-btn" class="primary-btn" disabled>
                        Send OTP to Email
                    </button>

                    <div class="resend-container" style="margin-top: 20px;">
                        <p><a href="login.html" class="login-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
                        </p>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <style>
        .alert-box {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .alert-box.error {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.4);
            color: #ff6b6b;
        }

        .alert-box.success {
            background: rgba(0, 210, 106, 0.12);
            border: 1px solid rgba(0, 210, 106, 0.35);
            color: #00d26a;
        }
    </style>

    <script src="forgot-password.js"></script>
</body>

</html>
