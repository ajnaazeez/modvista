<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coupons | ModVista</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .coupons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .coupon-card {
            background: var(--bg-dark-3);
            border: 1px dashed var(--input-border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .coupon-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-red);
        }

        .coupon-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .coupon-badge {
            background: rgba(255, 59, 48, 0.1);
            color: var(--neon-red);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .coupon-code-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .coupon-code {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
            letter-spacing: 1px;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .copy-btn:hover {
            color: var(--neon-red);
        }

        .coupon-detail {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .coupon-detail strong {
            color: var(--text-primary);
        }

        .coupon-expiry {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .expired {
            opacity: 0.6;
            filter: grayscale(1);
        }

        .expired .coupon-badge {
            background: #333;
            color: #888;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Mod<span>Vista</span></a>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="shop.html" class="nav-link">Shop</a></li>
                <li><a href="wishlist.html" class="nav-link">Wishlist</a></li>
                <li><a href="cart.html" class="nav-link">Cart</a></li>
                <li><a href="profile.html" class="nav-link active">Profile</a></li>
            </ul>

            <div class="nav-actions">
                <div class="nav-search">
                    <input type="text" placeholder="Search mods...">
                    <i class="fas fa-search"></i>
                </div>
                <!-- Auth User Menu -->
                <div class="user-menu auth-user" id="userMenu" style="display: none;">
                    <img class="user-avatar" id="navAvatar" src="assets/default-avatar.svg" alt="Avatar">
                    <div class="user-greet">
                        <small>Hi,</small>
                        <strong id="navUserName">User</strong>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Profile Layout -->
    <main class="profile-container">
        <div class="profile-grid">
            <!-- Sidebar -->
            <div id="sidebar-container"></div>

            <!-- Dynamic Content -->
            <section class="profile-content">
                <h2 class="section-heading">Available Coupons</h2>


                <div id="coupons-container" class="coupons-grid">
                    <!-- Loading State -->
                    <div class="loading-spinner">
                        <i class="fas fa-circle-notch fa-spin"></i> Loading coupons...
                    </div>
                </div>

                <!-- Empty State -->
                <div id="coupons-empty" style="display: none;" class="empty-state">
                    <i class="fas fa-tags" style="font-size: 3rem; color: #333; margin-bottom: 15px;"></i>
                    <h3>No coupons currently available</h3>
                    <p>Check back later for exclusive deals and seasonal discounts.</p>
                </div>
            </section>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="authGuard.js"></script>
    <script>requireAuth();</script>
    <script src="sidebar-loader.js"></script>
    <script src="script.js"></script>
    <script src="coupons.js"></script>
</body>

</html>
