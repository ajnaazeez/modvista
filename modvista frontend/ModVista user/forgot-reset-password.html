<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModVista | Reset Password</title>
    <meta name="description" content="Set a new password for your ModVista account.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <main class="signup-container">
        <!-- Left Section: Branding -->
        <section class="hero-section login">
            <div class="overlay"></div>
            <div class="branding-content">
                <h1 class="logo">Mod<span class="highlight">Vista</span></h1>
                <p class="tagline">SECURE YOUR ACCOUNT</p>
            </div>
        </section>

        <!-- Right Section: Reset Password Form -->
        <section class="form-section">
            <div class="form-panel" id="main-panel">
                <header class="form-header">
                    <h2>Reset Password</h2>
                    <p>Create a strong new password for your account.</p>
                </header>

                <div id="alert-box" class="alert-box" style="display:none;"></div>

                <form id="reset-form" novalidate>
                    <!-- New Password -->
                    <div class="input-group">
                        <label for="new-password">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="new-password" name="new-password"
                                placeholder="Enter new password" required>
                            <i class="fas fa-eye-slash toggle-password" data-target="new-password"></i>
                        </div>
                        <span class="error-message" id="new-password-error"></span>
                        <div class="password-requirements">
                            <p class="requirement" id="req-length"><i class="fas fa-circle"></i> At least 8 characters
                            </p>
                            <p class="requirement" id="req-upper"><i class="fas fa-circle"></i> One uppercase letter</p>
                            <p class="requirement" id="req-number"><i class="fas fa-circle"></i> One number</p>
                            <p class="requirement" id="req-special"><i class="fas fa-circle"></i> One special character
                            </p>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="input-group">
                        <label for="confirm-password">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirm-password" name="confirm-password"
                                placeholder="Confirm new password" required>
                            <i class="fas fa-eye-slash toggle-password" data-target="confirm-password"></i>
                        </div>
                        <span class="error-message" id="confirm-password-error"></span>
                    </div>

                    <button type="submit" id="reset-btn" class="primary-btn" disabled>
                        Reset Password
                    </button>
                </form>
            </div>
        </section>
    </main>

    <style>
        .alert-box {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .alert-box.error {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.4);
            color: #ff6b6b;
        }

        .alert-box.success {
            background: rgba(0, 210, 106, 0.12);
            border: 1px solid rgba(0, 210, 106, 0.35);
            color: #00d26a;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: var(--neon-red);
        }

        .password-requirements {
            margin-top: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .requirement {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .requirement:last-child {
            margin-bottom: 0;
        }

        .requirement i {
            font-size: 0.6rem;
        }

        .requirement.valid {
            color: #00d26a;
        }

        .requirement.valid i {
            color: #00d26a;
        }
    </style>

    <script src="forgot-reset-password.js"></script>
</body>

</html>
