<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModVista | Verify OTP</title>
    <meta name="description" content="Verify your OTP to reset your ModVista password.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <main class="signup-container">
        <!-- Left Section: Branding -->
        <section class="hero-section login">
            <div class="overlay"></div>
            <div class="branding-content">
                <h1 class="logo">Mod<span class="highlight">Vista</span></h1>
                <p class="tagline">VERIFY YOUR IDENTITY</p>
            </div>
        </section>

        <!-- Right Section: OTP Verify Form -->
        <section class="form-section">
            <div class="form-panel">
                <header class="form-header">
                    <h2>Enter OTP</h2>
                    <p id="otp-hint">Enter the 6-digit code sent to your email address.</p>
                </header>

                <div id="alert-box" class="alert-box" style="display:none;"></div>

                <form id="otp-form" novalidate>
                    <div class="input-group">
                        <label for="otp">6-Digit OTP</label>
                        <input type="text" id="otp" name="otp" placeholder="• • • • • •" maxlength="6"
                            inputmode="numeric" autocomplete="one-time-code" required
                            style="text-align:center; letter-spacing:0.6rem; font-size:1.6rem; font-weight:700;">
                        <span class="error-message" id="otp-error"></span>
                    </div>

                    <!-- Countdown timer -->
                    <p id="timer-text"
                        style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:8px; text-align:center;">
                    </p>

                    <button type="submit" id="verify-btn" class="primary-btn" disabled>
                        Verify OTP
                    </button>

                    <div class="resend-container" style="margin-top:16px; text-align:center;">
                        <p>Didn't get it?
                            <button type="button" id="resend-btn"
                                style="background:none;border:none;color:var(--neon-red);cursor:pointer;text-decoration:underline;font-family:inherit;font-size:inherit;">
                                Resend OTP
                            </button>
                        </p>
                    </div>

                    <div class="resend-container" style="margin-top:10px;">
                        <p><a href="forgot-password.html" class="login-link"><i class="fas fa-arrow-left"></i> Back</a>
                        </p>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <style>
        .alert-box {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .alert-box.error {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.4);
            color: #ff6b6b;
        }

        .alert-box.success {
            background: rgba(0, 210, 106, 0.12);
            border: 1px solid rgba(0, 210, 106, 0.35);
            color: #00d26a;
        }
    </style>

    <script src="forgot-otp.js"></script>
</body>

</html>
