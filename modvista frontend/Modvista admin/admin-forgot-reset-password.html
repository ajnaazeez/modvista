<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-card {
            padding: 48px 40px;
        }

        .success-state {
            text-align: center;
            display: none;
        }

        .success-state i {
            font-size: 4rem;
            color: #00d26a;
            margin-bottom: 24px;
        }

        .success-state h2 {
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .success-state p {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>

    <div class="login-wrapper">
        <div class="login-card" id="reset-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-lock-open"></i>
                </div>
                <h1>New Password</h1>
                <p>Create a strong new password for your admin account</p>
            </div>

            <form id="reset-password-form" class="login-form">
                <div class="input-group">
                    <label for="new-password">New Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="new-password" placeholder="At least 8 characters" required
                            minlength="8" />
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-double input-icon"></i>
                        <input type="password" id="confirm-password" placeholder="Repeat new password" required />
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="reset-btn">
                    Reset Password
                    <i class="fas fa-circle-check"></i>
                </button>

                <div class="error-message" id="admin-error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text"></span>
                </div>
            </form>

            <div class="success-state" id="success-state">
                <i class="fas fa-circle-check"></i>
                <h2>Password Reset!</h2>
                <p>Your password has been successfully updated. You can now use your new credentials to sign in.</p>
                <a href="admin-login.html" class="submit-btn"
                    style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script src="admin-forgot-reset-password.js"></script>
</body>

</html>
