<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP | Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-card {
            padding: 48px 40px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            margin-bottom: 24px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .otp-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 24px 0;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(255, 31, 31, 0.1);
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <a href="admin-forgot-password.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Back
            </a>

            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-shield-check"></i>
                </div>
                <h1>Verify OTP</h1>
                <p>Enter the 6-digit code sent to your email</p>
            </div>

            <form id="otp-verify-form" class="login-form">
                <div class="otp-inputs" id="otp-container">
                    <input type="text" maxlength="1" class="otp-input" required />
                    <input type="text" maxlength="1" class="otp-input" required />
                    <input type="text" maxlength="1" class="otp-input" required />
                    <input type="text" maxlength="1" class="otp-input" required />
                    <input type="text" maxlength="1" class="otp-input" required />
                    <input type="text" maxlength="1" class="otp-input" required />
                </div>

                <button type="submit" class="submit-btn" id="verify-btn">
                    Verify & Continue
                    <i class="fas fa-arrow-right"></i>
                </button>

                <div class="error-message" id="admin-error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text"></span>
                </div>

                <div class="login-footer" style="border-top: none; margin-top: 10px;">
                    <p>Didn't receive code? <a href="#" id="resend-otp">Resend</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-forgot-otp.js"></script>
</body>

</html>
