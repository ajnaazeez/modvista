<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-card {
            padding: 48px 40px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            margin-bottom: 24px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <a href="admin-login.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Back to Login
            </a>

            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-key"></i>
                </div>
                <h1>Forgot Password</h1>
                <p>Enter your admin email address to receive a reset OTP</p>
            </div>

            <form id="forgot-password-form" class="login-form">
                <div class="input-group">
                    <label for="admin-email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="admin-email" placeholder="admin@modvista.com" required />
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="request-otp-btn">
                    Send OTP
                    <i class="fas fa-paper-plane"></i>
                </button>

                <div class="error-message" id="admin-error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text"></span>
                </div>

                <div class="error-message" id="admin-success"
                    style="background: rgba(0, 210, 106, 0.1); border-color: rgba(0, 210, 106, 0.3); color: #00d26a;">
                    <i class="fas fa-check-circle"></i>
                    <span id="success-text"></span>
                </div>
            </form>
        </div>
    </div>

    <script src="admin-forgot-password.js"></script>
</body>

</html>
